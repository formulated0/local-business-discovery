<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Account – Local Business Discovery</title>
		<script>
			// try to fix this for github pages
			const basePath = window.location.pathname.includes('/local-business-discovery/') 
				? '/local-business-discovery/' 
				: '/';
			document.write('<base href="' + basePath + '">');
		</script>
		<link rel="stylesheet" href="../css/base.css">
		<link rel="stylesheet" href="../css/header.css">
		<link rel="stylesheet" href="../css/account.css">
	</head>
	<body>

		<header class="account-header">
			<div class="header-title">
				<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
					<circle cx="12" cy="8" r="4"/>
					<path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
				</svg>
				<span id="page-title">My Account</span>
			</div>
		</header>

		<div class="listings-toolbar">
			<a href="../index.html" class="back-link">← BACK</a>
		</div>

		<main class="account-body">

			<!-- profile summary -->
			<div class="profile-card">
				<div class="profile-avatar">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
						<circle cx="12" cy="8" r="4"/>
						<path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
					</svg>
				</div>
				<div class="profile-info">
					<h2 id="profile-name">–</h2>
					<p class="profile-email" id="profile-email">–</p>
					<p class="profile-type" id="profile-type">–</p>
				</div>
			</div>

			<!-- business listing editor (shown for business accounts only) -->
			<div class="section-card" id="listing-section" style="display:none">
				<h3>
					Your Listing
					<span class="listing-status draft" id="listing-status">Draft</span>
				</h3>
				<div class="listing-form">
					<div>
						<label for="listing-name">Business name</label>
						<input type="text" id="listing-name" placeholder="e.g. Corner Cafe">
					</div>
					<div>
						<label for="listing-category">Category</label>
						<select id="listing-category">
							<option value="restaurants">Restaurants</option>
							<option value="shopping">Shopping</option>
							<option value="travel">Travel</option>
						</select>
					</div>
					<div>
						<label for="listing-address">Address</label>
						<input type="text" id="listing-address" placeholder="e.g. 12 Church St, Parramatta">
					</div>
					<div>
						<label for="listing-description">Description</label>
						<textarea id="listing-description" placeholder="Tell customers about your business..."></textarea>
					</div>
					<div>
						<label for="listing-image">Business image</label>
						<input type="file" id="listing-image" accept="image/*">
						<p class="type-hint" id="image-hint">Optional. Shown on your listing card and detail page.</p>
						<div id="image-preview" style="display:none;margin-top:8px">
							<img id="image-preview-img" style="max-width:100%;border-radius:8px;max-height:160px;object-fit:cover" alt="preview">
						</div>
					</div>
					<p class="save-feedback" id="save-feedback"></p>
					<div class="btn-row">
						<button class="btn btn-primary" onclick="saveListing(false)">Save draft</button>
						<button class="btn btn-primary" onclick="saveListing(true)">Publish listing</button>
					</div>
				</div>
			</div>

			<!-- account actions -->
			<div class="section-card">
				<h3>Account</h3>
				<div class="btn-row">
					<button class="btn btn-danger" onclick="doLogout()">Log out</button>
				</div>
			</div>

		</main>

		<script src="../js/auth.js"></script>
		<script src="../js/data.js"></script>
		<script src="../js/account.js"></script>
	</body>
</html>
