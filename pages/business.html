<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Business – Local Business Discovery</title>
        <link rel="stylesheet" href="../css/base.css">
        <link rel="stylesheet" href="../css/header.css">
        <link rel="stylesheet" href="../css/business.css">
    </head>
    <body>

        <!-- business header -->
        <header class="business-header">
            <div class="header-title">
                <div class="business-logo" id="business-logo">Logo</div>
                <span id="business-name">Business Name</span>
            </div>
        </header>

        <!-- toolbar -->
        <div class="listings-toolbar">
            <a class="back-link" id="back-link" href="../index.html">← BACK</a>
        </div>

        <!-- main content -->
        <main class="business-body">

            <!-- left: description + map -->
            <div class="business-left">
                <div class="business-description" id="business-description">
                    Business description...
                </div>
                <div class="business-map">
                    Map placeholder
                </div>
            </div>

            <!-- middle: photos + star rating -->
            <div class="business-middle">
                <div class="photo-grid">
                    <div class="photo-main">Photo</div>
                    <div class="photo-thumb">Photo</div>
                    <div class="photo-thumb">Photo</div>
                </div>
                <div class="photo-more">More pictures</div>
                <div class="business-stars" id="business-stars">
                    ☆☆☆☆☆ <span>No ratings yet</span>
                </div>
            </div>

            <!-- right: reviews -->
            <div class="business-reviews">
                <h2>Reviews</h2>
                <div id="reviews-list">
                    <!-- placeholder review cards -->
                    <div class="review-card">
                        <div class="review-avatar"></div>
                        <div class="review-content">
                            <div class="review-text-line"></div>
                            <div class="review-text-line"></div>
                            <div class="review-text-line"></div>
                        </div>
                    </div>
                    <div class="review-card">
                        <div class="review-avatar"></div>
                        <div class="review-content">
                            <div class="review-text-line"></div>
                            <div class="review-text-line"></div>
                            <div class="review-text-line"></div>
                        </div>
                    </div>
                    <div class="review-card">
                        <div class="review-avatar"></div>
                        <div class="review-content">
                            <div class="review-text-line"></div>
                            <div class="review-text-line"></div>
                            <div class="review-text-line"></div>
                        </div>
                    </div>
                </div>
            </div>

        </main>

        <script src="../js/business.js"></script>
    </body>
</html>
