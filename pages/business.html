<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Business – Local Business Discovery</title>
		<script>
			// try to fix this for github pages
			const basePath = window.location.pathname.includes('/local-business-discovery/') 
				? '/local-business-discovery/' 
				: '/';
			document.write('<base href="' + basePath + '">');
		</script>
		<link rel="stylesheet" href="../css/base.css">
		<link rel="stylesheet" href="../css/header.css">
		<link rel="stylesheet" href="../css/business.css">
	</head>
	<body>

		<!-- business header -->
		<header class="business-header">
			<div class="header-title">
				<span id="business-name">Business Name</span>
			</div>
		</header>

		<!-- toolbar -->
		<div class="listings-toolbar">
			<a class="back-link" id="back-link" href="../index.html">← BACK</a>
		</div>

		<!-- main content -->
		<main class="business-body">

			<!-- left: description + address -->
			<div class="business-left">
				<div class="business-description" id="business-description">
					Business description...
				</div>
				<div class="business-address-box">
					<span class="address-label">📍 Address</span>
					<p id="business-address">–</p>
				</div>
			</div>

			<!-- middle: image + star rating -->
			<div class="business-middle">
				<div class="business-image" id="business-image">
					<span>No image provided</span>
				</div>
				<div class="business-stars" id="business-stars">
					☆☆☆☆☆ <span>No ratings yet</span>
				</div>
			</div>

			<!-- right: reviews -->
			<div class="business-reviews">
				<h2>Reviews</h2>

				<button class="btn btn-primary review-btn" id="write-review-btn" onclick="startReview()">Write a review</button>

				<!-- review form (hidden until write-review clicked) -->
				<div class="review-form" id="review-form" style="display:none">
					<div class="star-picker">
						<span class="star-pick" data-value="1">★</span>
						<span class="star-pick" data-value="2">★</span>
						<span class="star-pick" data-value="3">★</span>
						<span class="star-pick" data-value="4">★</span>
						<span class="star-pick" data-value="5">★</span>
					</div>
					<textarea id="review-text" placeholder="Share your experience..."></textarea>
					<p class="review-error" id="review-error"></p>
					<div class="btn-row">
						<button class="btn btn-primary" onclick="submitReview()">Submit</button>
						<button class="btn btn-secondary" onclick="cancelReview()">Cancel</button>
					</div>
				</div>

				<div id="reviews-list">
					<!-- rendered by business.js -->
				</div>
			</div>

		</main>

		<script src="../js/auth.js"></script>
		<script src="../js/data.js"></script>
		<script src="../js/business.js"></script>
	</body>
</html>
