<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sign In – Local Business Discovery</title>
		<link rel="stylesheet" href="../css/base.css">
		<link rel="stylesheet" href="../css/login.css">
	</head>
	<body>

		<div class="login-page">
			<div class="login-box">
				<h1>Local Business Discovery</h1>
				<p class="subtitle">Sign in or create an account to continue.</p>

				<!-- log in / sign up tabs -->
				<div class="auth-tabs">
					<button class="auth-tab active" id="tab-login" onclick="showTab('login')">Log in</button>
					<button class="auth-tab" id="tab-signup" onclick="showTab('signup')">Sign up</button>
				</div>

				<!-- log in form -->
				<div id="form-login" class="auth-form">
					<div>
						<label for="login-email">Email</label>
						<input type="email" id="login-email" placeholder="email@email.com">
					</div>
					<div>
						<label for="login-password">Password</label>
						<input type="password" id="login-password" placeholder="••••••••">
					</div>
					<p class="auth-error" id="login-error"></p>
					<button class="auth-submit" onclick="doLogin()">Log in</button>
				</div>

				<!-- sign up form -->
				<div id="form-signup" class="auth-form" style="display:none">
					<div>
						<label for="signup-name">Name</label>
						<input type="text" id="signup-name" placeholder="Your name">
					</div>
					<div>
						<label for="signup-email">Email</label>
						<input type="email" id="signup-email" placeholder="email@email.com">
					</div>
					<div>
						<label for="signup-password">Password</label>
						<input type="password" id="signup-password" placeholder="••••••••">
					</div>
					<div>
						<label>Account type</label>
						<div class="type-toggle">
							<button class="type-btn selected" id="type-customer" onclick="selectType('customer')">Customer</button>
							<button class="type-btn" id="type-business" onclick="selectType('business')">Business owner</button>
						</div>
						<p class="type-hint" id="type-hint">Browse and review local businesses.</p>
					</div>
					<p class="auth-error" id="signup-error"></p>
					<button class="auth-submit" onclick="doSignup()">Create account</button>
				</div>

				<a href="../index.html" class="login-back">← Back to home</a>
			</div>
		</div>

		<script src="../js/auth.js"></script>
		<script src="../js/login.js"></script>
	</body>
</html>
